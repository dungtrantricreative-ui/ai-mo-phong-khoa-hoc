<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SciCanvas - AI Mô phỏng</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- MathJax Config -->
    <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      svg: { fontCache: 'global' },
      startup: { typeset: false } // Tắt tự động chạy, ta sẽ chạy thủ công
    };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --bg-color: #fcfbf8; --text-main: #2b2a27; --accent-orange: #d16b47; --chat-bg: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; transition: 0.5s; position: relative; }
        body.split-view .main-content { flex: 0 0 40%; }
        
        .chat-container { width: 100%; max-width: 800px; height: 100%; display: flex; flex-direction: column; padding: 20px; padding-bottom: 100px; }
        #chat-history { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding-right: 10px; }
        
        .message { display: flex; gap: 15px; line-height: 1.6; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { justify-content: flex-end; }
        .message-content { max-width: 90%; padding: 15px; border-radius: 15px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .message.user .message-content { background: #f0f0f0; }
        .ai-icon { width: 24px; height: 24px; color: var(--accent-orange); flex-shrink: 0; margin-top: 10px; }
        
        /* MathJax & Code Style */
        .message-content p { margin-bottom: 10px; }
        mjx-container { font-size: 1.1em !important; } 

        /* Input Area */
        .input-area { position: absolute; bottom: 30px; width: 90%; max-width: 700px; background: #fff; padding: 10px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); display: flex; align-items: center; border: 1px solid #eee; }
        .input-area textarea { flex: 1; border: none; outline: none; padding: 10px; font-family: inherit; resize: none; max-height: 100px; }
        .send-btn { width: 40px; height: 40px; background: #333; color: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .send-btn:hover { background: var(--accent-orange); }

        /* Preview Panel */
        .preview-panel { display: none; flex: 1; background: #000; flex-direction: column; border-left: 1px solid #ddd; position: relative; }
        body.split-view .preview-panel { display: flex; }
        
        #svg-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #030613; position: relative; cursor: grab; }
        #svg-wrapper:active { cursor: grabbing; }
        #svg-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        #svg-container svg { width: 100%; height: 100%; pointer-events: none; } /* Để JS xử lý zoom */
        
        /* Controls */
        .controls { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 5px; }
        .controls button { width: 35px; height: 35px; background: rgba(255,255,255,0.2); border: none; color: #fff; border-radius: 5px; cursor: pointer; backdrop-filter: blur(5px); }
        .controls button:hover { background: var(--accent-orange); }
        
        /* Highlight */
        .highlight-link { color: var(--accent-orange); cursor: pointer; font-weight: 600; background: rgba(209, 107, 71, 0.1); padding: 0 5px; border-radius: 4px; }
        .highlight-link:hover { background: var(--accent-orange); color: #fff; }
        .svg-active { filter: drop-shadow(0 0 10px #ff9d76) !important; stroke: #ff9d76 !important; stroke-width: 2px; }
    </style>
</head>
<body>

<main class="main-content">
    <div class="chat-container">
        <div id="chat-history">
            <div class="message ai">
                <svg class="ai-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                <div class="message-content">Chào bạn! Hãy yêu cầu tôi mô phỏng hiện tượng khoa học (VD: Trái Đất quay quanh Mặt Trời).</div>
            </div>
        </div>
    </div>
    <div class="input-area">
        <textarea id="user-input" rows="1" placeholder="Nhập yêu cầu..."></textarea>
        <div class="send-btn" id="send-btn"><i class="ph ph-arrow-up"></i></div>
    </div>
</main>

<aside class="preview-panel">
    <div id="svg-wrapper">
        <div id="svg-container"></div>
    </div>
    <div class="controls">
        <button id="z-in"><i class="ph ph-plus"></i></button>
        <button id="z-reset"><i class="ph ph-corners-out"></i></button>
        <button id="z-out"><i class="ph ph-minus"></i></button>
    </div>
</aside>

<script>
    const chatHistory = document.getElementById('chat-history');
    const svgContainer = document.getElementById('svg-container');
    const svgWrapper = document.getElementById('svg-wrapper');
    const userInput = document.getElementById('user-input');
    
    // --- ZOOM & PAN LOGIC ---
    let scale = 1, pX = 0, pY = 0, isDown = false, startX, startY;
    
    function updateTransform() { svgContainer.style.transform = `translate(${pX}px, ${pY}px) scale(${scale})`; }
    
    svgWrapper.addEventListener('wheel', e => {
        e.preventDefault();
        scale += e.deltaY * -0.001;
        scale = Math.min(Math.max(.125, scale), 4);
        updateTransform();
    });
    
    svgWrapper.addEventListener('mousedown', e => { isDown = true; startX = e.pageX - pX; startY = e.pageY - pY; });
    svgWrapper.addEventListener('mouseleave', () => isDown = false);
    svgWrapper.addEventListener('mouseup', () => isDown = false);
    svgWrapper.addEventListener('mousemove', e => {
        if(!isDown) return;
        e.preventDefault();
        pX = e.pageX - startX;
        pY = e.pageY - startY;
        updateTransform();
    });

    document.getElementById('z-in').onclick = () => { scale *= 1.2; updateTransform(); };
    document.getElementById('z-out').onclick = () => { scale /= 1.2; updateTransform(); };
    document.getElementById('z-reset').onclick = () => { scale = 1; pX = 0; pY = 0; updateTransform(); };

    // --- CHAT LOGIC ---
    function addMsg(role, html) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.innerHTML = role === 'ai' ? 
            `<svg class="ai-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg><div class="message-content">${html}</div>` : 
            `<div class="message-content">${html}</div>`;
        chatHistory.appendChild(div);
        chatHistory.scrollTop = chatHistory.scrollHeight;
        return div;
    }

    // Xử lý link [-> id]
    window.processLinks = function(txt) {
        return marked.parse(txt).replace(/\[→\s*([a-zA-Z0-9_-]+)\]/g, 
            `<span class="highlight-link" onmouseover="hl('$1',1)" onmouseout="hl('$1',0)">$1</span>`);
    }

    window.hl = function(id, on) {
        const el = svgContainer.querySelector('#'+id);
        if(el) {
            if(on) el.classList.add('svg-active');
            else el.classList.remove('svg-active');
        }
    }

    async function send() {
        const txt = userInput.value.trim();
        if(!txt) return;
        
        userInput.value = '';
        addMsg('user', txt);
        const aiMsgDiv = addMsg('ai', 'Đang suy nghĩ...').querySelector('.message-content');
        
        try {
            const res = await fetch('/api/simulate/stream', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({prompt: txt})
            });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '', fullExpl = '';

            while(true) {
                const {done, value} = await reader.read();
                if(done) break;
                buffer += decoder.decode(value, {stream: true});
                const lines = buffer.split('\n\n');
                buffer = lines.pop();

                for(const line of lines) {
                    if(line.startsWith('data: ')) {
                        const data = JSON.parse(line.slice(6));
                        if(data.c) {
                            if(line.includes('event: explanation')) {
                                fullExpl += data.c;
                                aiMsgDiv.innerHTML = processLinks(fullExpl);
                            } else if(line.includes('event: svg')) {
                                document.body.classList.add('split-view');
                                svgContainer.innerHTML = data.c; // Render SVG sạch
                            }
                        }
                    }
                }
            }
            // Render công thức Toán sau khi xong
            if(window.MathJax) MathJax.typesetPromise([aiMsgDiv]);

        } catch(e) { aiMsgDiv.innerHTML = 'Lỗi kết nối!'; }
    }

    document.getElementById('send-btn').onclick = send;
    userInput.onkeydown = e => { if(e.key === 'Enter') send(); }
</script>
</body>
</html>
